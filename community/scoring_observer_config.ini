# Scoring configuration
#
# All values can be overridden by environment variables:
#   SCORING_*  — override [Scoring] values
#
# Example: SCORING_HOP_WEIGHT=0.7 overrides hop_weight below.

[Scoring]
# Weight for hop-count component of delivery score
hop_weight = 0.35

# Weight for infrastructure quality of inbound path (mesh_connections fan-in)
infra_weight = 0.30

# Weight for path reliability (confirmed observations to this sender)
reliability_weight = 0.20

# Weight for path freshness (how recently the path was confirmed)
freshness_weight = 0.15

# Maximum fallback delay window in milliseconds when coordinator is unreachable
base_delay_ms = 2000

# Minimum delay even for the best-scored bot (prevents zero-delay races)
min_delay_ms = 100

# Random jitter added to delay to prevent ties between equally-scored bots
max_jitter_ms = 200

