# Scoring and NetworkObserver configuration
#
# All values can be overridden by environment variables:
#   SCORING_*  — override [Scoring] values
#   OBSERVER_* — override [NetworkObserver] values
#
# Example: SCORING_HOP_WEIGHT=0.7 overrides hop_weight below.

[Scoring]
# Weight for hop-count component of proximity score (0.0–1.0)
# Higher value = hop count matters more than path significance
hop_weight = 0.6

# Weight for path-significance component (0.0–1.0)
# hop_weight + path_sig_weight should equal 1.0
path_sig_weight = 0.4

# Maximum fallback delay window in milliseconds when coordinator is unreachable
base_delay_ms = 2000

# Minimum delay even for the best-scored bot (prevents zero-delay races)
min_delay_ms = 100

# Random jitter added to delay to prevent ties between equally-scored bots
max_jitter_ms = 200

# Seconds without coordinator contact before score starts degrading
degrade_after_seconds = 3600

# Target score to degrade toward (0.5 = neutral)
degrade_target = 0.5

# Window over which degradation completes (seconds, default 24h)
degrade_window_seconds = 86400

[NetworkObserver]
# Rolling window of days to retain daily repeater stats
window_days = 7

# Minimum number of observations before a node's significance is trusted
# (below this threshold, significance defaults to 0.5 = uncertain)
min_observations = 10

# How often to run DB cleanup of old stats (seconds)
cleanup_interval_seconds = 86400

# How often to log a summary of observed nodes (seconds, 0 = disabled)
summary_interval_seconds = 3600
