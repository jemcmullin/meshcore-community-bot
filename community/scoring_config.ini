# Scoring configuration
#
# All values can be overridden by environment variables:
#   SCORING_*  — override [Scoring] values
#
# Example: SCORING_HOP_WEIGHT=0.7 overrides hop_weight below.

[Scoring]
# Primary bidirectional signal from mesh_connections fan-in
infrastructure_weight = 0.40

# Proximity from live inbound hop count
hop_weight = 0.35

# Exact path familiarity bonus for sender+path match
path_bonus_weight = 0.15

# Recency decay from sender observations
freshness_weight = 0.10

# Maximum fallback delay window in milliseconds when coordinator is unreachable
base_delay_ms = 2000

# Minimum delay even for the best-scored bot (prevents zero-delay races)
min_delay_ms = 100

# Random jitter added to delay to prevent ties between equally-scored bots
max_jitter_ms = 200

# Minimum delivery score required to respond when coordinator is unreachable.
# Bots below this threshold are intentionally silenced during fallback.
# Tuning guidance:
#   0.20 = conservative (rarely silences)
#   0.30 = balanced default
#   0.40 = aggressive duplicate suppression
fallback_min_delivery_score = 0.30

# Minimum signal score required to before penalizing infrastructure component.
# Downrank bots with signal quality issue with their first hop.
# Tuning guidance:
#   0.20 = very permissive (SNR ≈ -9 dB, RSSI ≈ -102 dBm; allows marginal LoRa links)
#   0.30 = balanced default (SNR ≈ -6 dB, RSSI ≈ -93 dBm; typical LoRa mesh threshold)
#   0.40 = strict (SNR ≈ -3 dB, RSSI ≈ -84 dBm; only strong links allowed)
#   0.50 = very strict (SNR ≈ 0 dB, RSSI ≈ -75 dBm; only excellent links allowed)
min_signal_score = 0.30